<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Մուտք | ԹԳՀԳ</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(135deg,#0f172a,#111827,#1e1b4b);
overflow:hidden;
color:white;
}

.card{
width:90%;
max-width:420px;
padding:40px 30px;
border-radius:30px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.12);
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

h1{
font-size:50px;
margin-bottom:10px;
background:linear-gradient(90deg,#fff,#a78bfa,#60a5fa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{
color:#d1d5db;
margin-bottom:30px;
}

input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:14px;
background:rgba(255,255,255,0.12);
color:white;
font-size:16px;
margin-bottom:20px;
}

input::placeholder{
color:#cbd5e1;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:700;
cursor:pointer;
background:linear-gradient(90deg,#7c3aed,#2563eb);
color:white;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

.error{
margin-top:15px;
color:#fca5a5;
font-size:14px;
}

</style>
</head>

<body>

<div class="card">

<h1>ԹԳՀԳ</h1>

<p>Մուտք գործիր համակարգ</p>

<input type="text" id="username" placeholder="Գրիր անուն և ազգանուն">

<button onclick="login()">Մուտք</button>

<div class="error" id="error"></div>

</div>

<script>

function login(){

const username=document.getElementById("username").value.trim();

if(username.length < 3){
document.getElementById("error").innerText="Լրացրու ճիշտ անուն";
return;
}

localStorage.setItem("studentName",username);

window.location.href="dashboard.html";

}

</script>

</body>
</html>
